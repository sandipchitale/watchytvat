<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watch Later At</title>
  <link rel="stylesheet" href="side_panel.css">
</head>

<body>
  <div class="header">
    <img src="icons/icon48.png" alt="" class="logo">
    <h1>Watch Later At</h1>
  </div>

  <div class="toolbar">
    <span id="last-refresh" class="muted"></span>
    <div class="toolbar-right">
      <a id="playlist-link" class="playlist-link hidden" href="#" target="_blank" rel="noopener"
        title="Open Watch Later At playlist">↗ Playlist</a>
      <button id="refresh-btn" class="refresh-btn" title="Refresh list">↻ Refresh</button>
    </div>
  </div>

  <div class="items-section">
    <div id="items-list"></div>
    <div id="empty-state" class="muted hidden">No saved items yet. Open a YouTube video and save your position via the extension popup.</div>
  </div>

  <script src="side_panel.js"></script>
</body>

</html>
