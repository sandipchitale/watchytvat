<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watch YT Videos At</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <img src="icons/icon48.png" alt="" class="logo">
    <h1>Watch YT Videos At</h1>
  </div>

  <div id="current-video" class="section hidden">
    <div id="video-title" class="video-title"></div>
    <button id="save-btn" class="save-btn">
      Save at <span id="current-time">–</span>
    </button>
  </div>

  <div id="not-on-video" class="section">
    <p class="muted">Open a YouTube video to save your position.</p>
  </div>

  <div class="section">
    <div class="section-header">
      Saved in "Watch Later At"
      <a id="playlist-link" class="playlist-link hidden" href="#" target="_blank" rel="noopener"
        title="Open Watch Later At playlist">↗</a>
    </div>
    <div id="items-list"></div>
    <div id="empty-state" class="muted hidden">No saved items yet.</div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
